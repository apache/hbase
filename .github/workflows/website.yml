# yamllint disable rule:line-length
---
name: Build and publish website

"on":
  # FIXME: Remove this PR here before merge!
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
  - cron: '0 14 * * *'

permissions: {}

jobs:
  website:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout HBase
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: src
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Maven cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.m2
          key: hbase-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            hbase-m2-

      # Install Node.js. Needed for Playwright.
      - name: Use Node.js
        uses: actions/setup-node@v53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24' # LTS

      # Install Playwright dependencies. Needed for docs PDF export and docs UI e2e tests.
      - name: Install Playwright dependencies
        run: npx -y playwright install --with-deps

      - name: Generate HBase website
        run: |
          #!/usr/bin/env bash
          set -e
          set -x
          bash src/dev-support/jenkins-scripts/generate-hbase-website.sh --working-dir "${{ github.workspace }}" --publish src

      - name: Publish logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: logs
          path: ${{ github.workspace }}/hbase-*.txt
          retention-days: 7
